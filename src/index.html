<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galerie du Vieux Saint-Jean</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appli">
    <aside id="barre-laterale" aria-label="Navigation principale">

      <button id="logo-galeria" class="logo-galeria" type="button" title="Retour à l'accueil">
        <img src="../gabarits/actifs/logo-galeria.png" alt="Galeria" class="logo-galeria-img">
      </button>

      <nav class="menu-sidebar" aria-label="Sections">
        <button class="entree-sidebar menu-accueil-detache" data-vue="accueil">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 11l9-8 9 8"/>
              <path d="M5 9.5V21h14V9.5"/>
              <path d="M10 21v-6h4v6"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Accueil</span>
        </button>

        <div class="menu-groupe-label">Catalogue</div>
        <button class="entree-sidebar" data-vue="artistes-liste">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Artistes</span>
        </button>
        <button class="entree-sidebar" data-vue="oeuvres-liste">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="9" cy="9" r="1.5"/>
              <path d="M21 16l-5-5L5 21"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">&OElig;uvres</span>
        </button>

        <div class="menu-groupe-label">Ventes</div>
        <button class="entree-sidebar" data-vue="clients-liste">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="8" r="3.5"/>
              <path d="M3 21c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
              <circle cx="17" cy="9" r="3"/>
              <path d="M22 20c0-2.5-2-4.5-4.5-4.5"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Clients</span>
        </button>
        <button class="entree-sidebar" data-vue="ventes-liste">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 17 9 11 13 15 21 7"/>
              <polyline points="14 7 21 7 21 14"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Ventes</span>
        </button>
        <button class="entree-sidebar" data-vue="suivi">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 4H7a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
              <path d="M9 14l2 2 4-4"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Suivi</span>
        </button>

        <div class="menu-groupe-label">Archives</div>
        <button class="entree-sidebar" data-vue="documents">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="8" y1="13" x2="16" y2="13"/>
              <line x1="8" y1="17" x2="16" y2="17"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Documents</span>
        </button>
        <button class="entree-sidebar" data-vue="rapport">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16v16H4z" opacity="0"/>
              <path d="M9 3h6a2 2 0 0 1 2 2v0H7v0a2 2 0 0 1 2-2z"/>
              <rect x="5" y="5" width="14" height="16" rx="2"/>
              <line x1="9" y1="10" x2="15" y2="10"/>
              <line x1="9" y1="14" x2="15" y2="14"/>
              <line x1="9" y1="18" x2="13" y2="18"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Rapport</span>
        </button>
      </nav>

      <nav class="menu-sidebar menu-sidebar-bas" aria-label="Utilitaires">
        <button class="entree-sidebar" data-vue="outils">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a3 3 0 0 0 4 4l-9 9-4 1 1-4 8-10z"/>
              <path d="M3 21l3-3"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">Outils</span>
        </button>
        <button class="entree-sidebar" data-vue="reglages">
          <span class="entree-sidebar-icone" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </span>
          <span class="entree-sidebar-libelle">R&eacute;glages</span>
        </button>
      </nav>

      <button id="btn-profil-galerie" class="profil-sidebar" type="button" title="Modifier le profil de la galerie">
        <div class="profil-avatar"><span>GVSJ</span></div>
        <div class="profil-info">
          <p class="profil-nom" id="profil-nom-galerie">Galerie du Vieux Saint-Jean</p>
          <p class="profil-role">Profil de la galerie</p>
        </div>
      </button>

    </aside>

    <button id="btn-retour" class="btn-retour-flottant" aria-label="Retour" title="Retour">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <main id="contenu" aria-live="polite"></main>

  </div>
  <script type="module" src="app/app.js"></script>
</body>
</html>
