<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galerie du Vieux Saint-Jean</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="appli">
    <header id="entete">
      <button id="btn-retour" class="btn-entete" aria-label="Retour" title="Retour">&larr;</button>
      <button id="btn-accueil-entete" class="btn-titre" title="Retour à l'accueil">
        <svg class="icone-accueil-entete" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 11.5 L12 4 L21 11.5"/>
          <path d="M5 10.5 V20 a1 1 0 0 0 1 1 H9 V14 H15 V21 H18 a1 1 0 0 0 1 -1 V10.5"/>
        </svg>
        <span id="nom-entete">Galerie du Vieux Saint-Jean</span>
      </button>
      <div id="actions-entete"></div>
    </header>
    <main id="contenu" aria-live="polite"></main>
    <footer>
      <p>Version 0.1.0</p>
    </footer>
  </div>
  <script type="module" src="app/app.js"></script>
</body>
</html>
