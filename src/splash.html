<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Galeria</title>
  <style>
    @font-face {
      font-family: 'Garamond Galeria';
      src: url('../gabarits/actifs/garamond-italic.woff2') format('woff2');
      font-style: italic;
      font-weight: 400;
      font-display: block;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1c34;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .splash {
      position: absolute;
      inset: 0;
      background-image: url('../gabarits/actifs/splash-galeria.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .version {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Garamond Galeria', 'Garamond', serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.05em;
      color: #d9b66b;
      opacity: 0;
      transition: opacity 0.6s ease-in;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .version.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="splash"></div>
  <div class="version" id="version"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const v = params.get('v') || '';
    const el = document.getElementById('version');
    el.textContent = v ? 'version ' + v : '';
    requestAnimationFrame(() => el.classList.add('visible'));
  </script>
</body>
</html>
