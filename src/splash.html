<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Galeria</title>
  <style>
    @font-face {
      font-family: 'Garamond Galeria';
      src: url('../gabarits/actifs/garamond-italic.woff2') format('woff2');
      font-style: italic;
      font-weight: 400;
      font-display: block;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1c34;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .splash {
      position: absolute;
      inset: 0;
      background-image: url('../gabarits/actifs/splash-galeria.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .version {
      position: absolute;
      bottom: 56px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Garamond Galeria', 'Garamond', serif;
      font-style: italic;
      font-size: 18px;
      letter-spacing: 0.05em;
      color: #d9b66b;
      opacity: 0;
      transition: opacity 0.6s ease-in;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .version.visible {
      opacity: 1;
    }

    /* Progression du chargement */
    .prog-zone {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 22px;
    }
    .prog-barre {
      height: 4px;
      border-radius: 4px;
      background: rgba(217, 182, 107, 0.22);
      overflow: hidden;
    }
    .prog-remplissage {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: #d9b66b;
      transition: width 0.35s ease;
    }
    .prog-texte {
      margin-top: 8px;
      text-align: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 11.5px;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="splash"></div>
  <div class="version" id="version"></div>
  <div class="prog-zone">
    <div class="prog-barre"><div class="prog-remplissage" id="prog-fill"></div></div>
    <div class="prog-texte" id="prog-texte">Démarrage…</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const v = params.get('v') || '';
    const el = document.getElementById('version');
    el.textContent = v ? 'version ' + v : '';
    requestAnimationFrame(() => el.classList.add('visible'));

    // Appelé par le processus principal (via executeJavaScript) à chaque étape.
    const elFill = document.getElementById('prog-fill');
    const elTexte = document.getElementById('prog-texte');
    window.majProgres = function (pct, texte) {
      if (typeof pct === 'number') elFill.style.width = Math.max(0, Math.min(100, pct)) + '%';
      if (typeof texte === 'string') elTexte.textContent = texte;
    };
  </script>
</body>
</html>
