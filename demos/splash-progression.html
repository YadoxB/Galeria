<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Galeria — Démo splash avec progression</title>
  <style>
    @font-face {
      font-family: 'Garamond Galeria';
      src: url('../gabarits/actifs/garamond-italic.woff2') format('woff2');
      font-style: italic; font-weight: 400; font-display: block;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1a1a; }
    .cadre { display: flex; gap: 24px; align-items: flex-start; padding: 24px; flex-wrap: wrap; }
    .note { color: #bbb; font-family: system-ui, sans-serif; font-size: 13px; max-width: 320px; line-height: 1.5; }
    .note b { color: #fff; }
    .note button { margin-top: 12px; background: #d9b66b; color: #0d1c34; border: 0; border-radius: 8px; padding: 8px 16px; font-weight: 600; cursor: pointer; }

    /* Reproduction de la fenêtre splash (600 × 338) */
    .splash-fenetre {
      position: relative; width: 600px; height: 338px; overflow: hidden;
      background: #0d1c34; border-radius: 6px; box-shadow: 0 12px 40px rgba(0,0,0,.5);
      -webkit-user-select: none; user-select: none;
    }
    .splash { position: absolute; inset: 0; background-image: url('../gabarits/actifs/splash-galeria.png'); background-size: cover; background-position: center; background-repeat: no-repeat; }

    .version {
      position: absolute; bottom: 56px; left: 0; right: 0; text-align: center;
      font-family: 'Garamond Galeria', Garamond, serif; font-style: italic;
      font-size: 18px; letter-spacing: .05em; color: #d9b66b;
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
    }

    /* Zone de progression */
    .prog-zone { position: absolute; left: 48px; right: 48px; bottom: 22px; }
    .prog-barre { height: 4px; border-radius: 4px; background: rgba(217,182,107,.22); overflow: hidden; }
    .prog-remplissage {
      height: 100%; width: 0%; border-radius: 4px; background: #d9b66b;
      transition: width .35s ease;
    }
    .prog-texte {
      margin-top: 8px; text-align: center;
      font-family: system-ui, -apple-system, sans-serif; font-size: 11.5px;
      letter-spacing: .02em; color: rgba(255,255,255,.72);
    }
  </style>
</head>
<body>
  <div class="cadre">
    <div class="splash-fenetre">
      <div class="splash"></div>
      <div class="version">version 0.2.5</div>
      <div class="prog-zone">
        <div class="prog-barre"><div class="prog-remplissage" id="fill"></div></div>
        <div class="prog-texte" id="texte">Démarrage…</div>
      </div>
    </div>

    <div class="note">
      <b>Splash avec progression (#18).</b><br>
      Une barre dorée + un libellé d'étape sous la version. Au premier lancement,
      la copie des photos affiche un décompte <b>X / N</b>. Si une étape bloque,
      la barre reste figée à cet endroit avec son libellé — on voit tout de suite
      où ça coince.<br>
      <button id="rejouer">▶ Rejouer la séquence</button>
    </div>
  </div>

  <script>
    const fill = document.getElementById('fill');
    const texte = document.getElementById('texte');
    function maj(pct, t) { fill.style.width = pct + '%'; texte.textContent = t; }

    async function sequence() {
      maj(0, 'Démarrage…');
      await attendre(500);
      maj(12, 'Ouverture de la base de données…');
      await attendre(700);
      // Simulation de la copie des photos (1er lancement)
      const total = 540;
      for (let i = 0; i <= total; i += 18) {
        const pct = 20 + Math.floor((i / total) * 60); // 20 → 80 %
        maj(pct, `Préparation des photos… ${Math.min(i, total)} / ${total}`);
        await attendre(45);
      }
      maj(88, 'Chargement de l’interface…');
      await attendre(700);
      maj(100, 'Prêt');
    }
    const attendre = (ms) => new Promise((r) => setTimeout(r, ms));
    document.getElementById('rejouer').addEventListener('click', sequence);
    sequence();
  </script>
</body>
</html>
